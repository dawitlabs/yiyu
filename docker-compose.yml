services:
  postgres:
    image: postgres:16
    container_name: yiyu
    environment:
      POSTGRES_USER: dawit
      POSTGRES_PASSWORD: dawit
      POSTGREs_DB: yiyu
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
volumes:
  postgres_data:
