services:
  postgres:
    image: postgres:16
    container_name: yiyu
    environment:
      POSTGRES_USER: dawit
      POSTGRES_PASSWORD: dawit
      POSTGRES_DB: yiyu
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: yiyu-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: dawit
      MINIO_ROOT_PASSWORD: dawitdawit
      # Per-bucket CORS (mc cors set) is an AIStor-only (paid) feature.
      # Open-source MinIO only supports this cluster-wide env var instead.
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    ports:
      - "9002:9000" # S3 API
      - "9003:9001" # web console
    volumes:
      - minio_data:/data
    restart: unless-stopped

  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: yiyu-mediamtx
    ports:
      - "1935:1935" # RTMP ingest (OBS pushes here)
      - "8888:8888" # HLS output — internal, only cmd/api's reverse proxy should read this
      - "9997:9997" # control API — internal, only cmd/worker's poller should read this
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 dawit dawitdawit; do sleep 1; done;
      mc mb --ignore-existing local/yiyu-videos;
      mc anonymous set download local/yiyu-videos;
      "

volumes:
  postgres_data:
  minio_data:
