app = 'yiyu-api'
primary_region = 'cdg'

[build]

[env]
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  grace_period = '5s'
  interval = '15s'
  method = 'GET'
  path = '/healthz'
  timeout = '5s'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
