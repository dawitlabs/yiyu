version: "2"

sql:
  - engine: "postgresql"
    queries: "internal/adapters/repository/queries"
    schema: "migrations"
    gen:
      go:
        package: "repository"
        out: "internal/adapters/repository"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_db_tags: true
        emit_interface: true
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
