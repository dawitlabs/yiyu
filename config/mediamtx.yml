# A custom config file replaces MediaMTX's entire built-in default config
# rather than merging with it, so anything the defaults normally provide has
# to be restated here explicitly.
api: yes
apiAddress: :9997

# The default "all_others" wildcard path, which lets a stream publish to any
# path name (our secret stream_key) without it being pre-registered.
paths:
  all_others:

# MediaMTX's own default permission set for anonymous callers doesn't
# include the "api" action — only publish/read/playback. Since the API port
# is meant to stay off the public internet (see docker-compose.yml), it's
# fine to allow it here rather than wiring up credentials.
authInternalUsers:
  - user: any
    pass:
    ips: []
    permissions:
      - action: publish
      - action: read
      - action: playback
      - action: api
